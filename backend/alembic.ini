# Alembic configuration file for PGMRec
# Run migrations with:  alembic upgrade head
# (from the backend/ directory)

[alembic]
# Path to migration scripts — relative to this file
script_location = alembic

# The database URL is read from the PGMREC_DATABASE_URL environment variable
# at runtime by env.py.  This placeholder is never actually used by the app.
sqlalchemy.url = sqlite:///./pgmrec.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
