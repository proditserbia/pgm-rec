# ─── PGMRec — docker-compose.yml ─────────────────────────────────────────────
#
# Brings up the PGMRec backend (and optionally an Nginx reverse proxy).
# PGMRec is a LAN-only application — it is not designed for public internet access.
#
# Quick start (single machine / local access only):
#   cp .env.example .env          # edit secrets
#   docker compose up -d
#   # Access: http://localhost:8000
#
# LAN access (from other machines on your network):
#   In .env, set: PGMREC_CORS_ORIGINS=http://192.168.1.10:8000
#   In ports below, change 127.0.0.1:8000:8000  →  0.0.0.0:8000:8000
#   Access: http://192.168.1.10:8000  (replace with your server's LAN IP)
#
# The backend serves both the API (/api/v1/) and the pre-built frontend (/)
# from port 8000.  For an optional Nginx proxy uncomment the nginx service below.

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: pgmrec-backend:latest
    container_name: pgmrec-backend
    restart: unless-stopped
    env_file: .env
    ports:
      # Bind to loopback by default — only this machine can reach port 8000.
      # Change to "0.0.0.0:8000:8000" for LAN access.
      - "127.0.0.1:8000:8000"
    volumes:
      # Persist all data outside the container
      - pgmrec-data:/app/data
      - pgmrec-logs:/app/logs
      # Mount channel configs from host for easy editing without rebuilding
      # - ./backend/data/channels:/app/data/channels:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Optional: Nginx reverse proxy ─────────────────────────────────────────
  # Useful for LAN-wide access via a hostname or custom port, or to add
  # optional HTTPS with a self-signed / local CA certificate.
  # Requires: docs/nginx.conf.example (edit server_name to your LAN hostname/IP)
  #
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: pgmrec-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "0.0.0.0:80:80"
  #     - "0.0.0.0:443:443"
  #   volumes:
  #     - ./docs/nginx.conf.example:/etc/nginx/conf.d/pgmrec.conf:ro
  #     # For HTTPS: mount your internal CA cert or self-signed cert
  #     # - /etc/ssl/pgmrec:/etc/ssl/pgmrec:ro
  #   depends_on:
  #     - backend

volumes:
  pgmrec-data:
  pgmrec-logs:
